          <rect x="40" width="10" height="18" rx="3" fill="#2563EB" opacity=".35"/>
          <rect x="60" width="10" height="38" rx="3" fill="#2563EB" opacity=".70"/>
          <rect x="80" width="10" height="28" rx="3" fill="#2563EB" opacity=".55"/>
          <rect x="100" width="10" height="44" rx="3" fill="#2563EB" opacity=".80"/>
