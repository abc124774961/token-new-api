        <rect y="26" width="344" height="120" rx="14" fill="#0B1624"/>
        <path d="M18 110 C60 76,90 86,126 68 C170 44,196 70,238 50 C280 30,308 46,326 38" stroke="#5EEAD4" stroke-width="4" fill="none"/>
        <path d="M18 110 C60 76,90 86,126 68 C170 44,196 70,238 50 C280 30,308 46,326 38 L326 130 L18 130Z" fill="#14B8A6" opacity=".13"/>
        <g transform="translate(20 88)">
