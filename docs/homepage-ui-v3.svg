    <!-- Proof strip -->
    <g transform="translate(140 900)">
      <rect width="1320" height="172" rx="28" class="card" filter="url(#shadow)"/>
      <text x="42" y="58" class="label">为什么不是普通 API 转发</text>
      <text x="42" y="102" class="h2">把限流、断流、慢响应和账单失控，变成可运营的稳定入口</text>
      <g transform="translate(880 42)">
        <rect width="116" height="88" rx="18" fill="#F0FDFA" stroke="#B6EFE6"/>
        <text x="58" y="40" text-anchor="middle" class="mono" font-size="24" font-weight="950" fill="#0F766E">1s</text>
        <text x="58" y="64" text-anchor="middle" class="tiny">故障切换</text>
        <rect x="136" width="116" height="88" rx="18" fill="#EFF6FF" stroke="#BFDBFE"/>
        <text x="194" y="40" text-anchor="middle" class="mono" font-size="24" font-weight="950" fill="#2563EB">0.1x</text>
        <text x="194" y="64" text-anchor="middle" class="tiny">分组倍率</text>
        <rect x="272" width="116" height="88" rx="18" fill="#F8FAFC" stroke="#E2E8F0"/>
        <text x="330" y="40" text-anchor="middle" class="mono" font-size="24" font-weight="950" fill="#0F172A">30d</text>
        <text x="330" y="64" text-anchor="middle" class="tiny">运行证据</text>
      </g>
    </g>

    <!-- Reliability Section -->
    <g transform="translate(140 1160)">
      <text class="label">稳定运行</text>
      <text y="58" class="h2">给客户看的不是口号，是近 30 天真实运行视图</text>
      <text y="94" class="body">公开展示脱敏后的成功率、延迟、请求量和保护事件，让“稳定”变成可验证的信任资产。</text>
      <rect y="134" width="1320" height="430" rx="30" class="card" filter="url(#shadow)"/>
      <g transform="translate(34 168)">
        <rect width="300" height="158" rx="22" fill="#FFFFFF" stroke="rgba(15,23,42,.08)"/>
        <text x="24" y="42" class="small">近 30 天成功率</text>
        <text x="24" y="92" class="mono" font-size="44" font-weight="950" fill="#0F172A">99.98%</text>
        <text x="24" y="126" class="tiny">按最终请求结果聚合</text>
        <rect y="182" width="300" height="158" rx="22" fill="#FFFFFF" stroke="rgba(15,23,42,.08)"/>
        <text x="24" y="224" class="small">自动保护事件</text>
        <text x="24" y="274" class="mono" font-size="44" font-weight="950" fill="#0F172A">128</text>
        <text x="24" y="308" class="tiny">限流 / 超时 / 上游异常</text>
      </g>
      <g transform="translate(372 168)">
        <rect width="550" height="340" rx="22" fill="#FFFFFF" stroke="rgba(15,23,42,.08)"/>
        <text x="28" y="44" class="h3">成功率与请求量</text>
        <line x1="28" y1="270" x2="522" y2="270" stroke="#E2E8F0"/>
        <line x1="28" y1="210" x2="522" y2="210" stroke="#E2E8F0"/>
        <line x1="28" y1="150" x2="522" y2="150" stroke="#E2E8F0"/>
        <path d="M38 238 C82 208,120 220,164 190 C210 158,252 176,296 138 C340 100,386 128,430 92 C470 62,500 86,512 76" stroke="#0F766E" stroke-width="5" fill="none"/>
        <path d="M38 238 C82 208,120 220,164 190 C210 158,252 176,296 138 C340 100,386 128,430 92 C470 62,500 86,512 76 L512 270 L38 270Z" fill="#14B8A6" opacity=".12"/>
        <g transform="translate(42 282)">
          <rect width="12" height="30" rx="4" fill="#2563EB" opacity=".35"/>
          <rect x="28" width="12" height="42" rx="4" fill="#2563EB" opacity=".55"/>
          <rect x="56" width="12" height="26" rx="4" fill="#2563EB" opacity=".35"/>
          <rect x="84" width="12" height="52" rx="4" fill="#2563EB" opacity=".75"/>
          <rect x="112" width="12" height="36" rx="4" fill="#2563EB" opacity=".50"/>
          <rect x="140" width="12" height="64" rx="4" fill="#2563EB" opacity=".86"/>
          <rect x="168" width="12" height="44" rx="4" fill="#2563EB" opacity=".58"/>
          <rect x="196" width="12" height="72" rx="4" fill="#2563EB" opacity=".92"/>
          <rect x="224" width="12" height="40" rx="4" fill="#2563EB" opacity=".54"/>
          <rect x="252" width="12" height="80" rx="4" fill="#2563EB" opacity=".98"/>
          <rect x="280" width="12" height="54" rx="4" fill="#2563EB" opacity=".74"/>
          <rect x="308" width="12" height="70" rx="4" fill="#2563EB" opacity=".88"/>
          <rect x="336" width="12" height="48" rx="4" fill="#2563EB" opacity=".66"/>
          <rect x="364" width="12" height="76" rx="4" fill="#2563EB" opacity=".94"/>
          <rect x="392" width="12" height="56" rx="4" fill="#2563EB" opacity=".76"/>
          <rect x="420" width="12" height="82" rx="4" fill="#2563EB"/>
        </g>
      </g>
      <g transform="translate(958 168)">
        <rect width="328" height="340" rx="22" fill="#0F172A"/>
        <text x="28" y="44" class="darkText">今日路由事件</text>
        <g transform="translate(28 78)">
          <rect width="272" height="54" rx="14" fill="#172536"/>
          <circle cx="28" cy="27" r="8" fill="#22C55E"/>
          <text x="48" y="24" class="darkText" font-size="14">gpt-5.5 → 渠道 4</text>
          <text x="48" y="42" class="darkTiny">流式正常 eof</text>
          <rect y="70" width="272" height="54" rx="14" fill="#172536"/>
          <circle cx="28" cy="97" r="8" fill="#F59E0B"/>
          <text x="48" y="94" class="darkText" font-size="14">429 限流保护</text>
          <text x="48" y="112" class="darkTiny">自动切换备用线路</text>
          <rect y="140" width="272" height="54" rx="14" fill="#172536"/>
          <circle cx="28" cy="167" r="8" fill="#38BDF8"/>
          <text x="48" y="164" class="darkText" font-size="14">缓存读命中</text>
          <text x="48" y="182" class="darkTiny">成本按倍率结算</text>
          <rect y="210" width="272" height="54" rx="14" fill="#172536"/>
          <circle cx="28" cy="237" r="8" fill="#22C55E"/>
          <text x="48" y="234" class="darkText" font-size="14">Claude Code 长任务</text>
          <text x="48" y="252" class="darkTiny">持续输出稳定</text>
        </g>
      </g>
    </g>

    <!-- Scenario Cards -->
    <g transform="translate(140 1840)">
      <text class="label">真实场景</text>
      <text y="58" class="h2">不是“转发一下”，而是替 AI 编程工作流兜底</text>
      <g transform="translate(0 106)">
        <rect width="420" height="220" rx="26" class="card" filter="url(#shadow)"/>
        <rect x="28" y="28" width="52" height="52" rx="16" fill="#DDFBF4"/>
        <text x="54" y="63" text-anchor="middle" font-size="24" fill="#0F766E">⌘</text>
        <text x="28" y="112" class="h3">长时间编码会话</text>
        <text x="28" y="150" class="body">连续生成、改错、跑测试时，网关持续选择健康线路，减少中途断流。</text>
        <rect x="450" width="420" height="220" rx="26" class="card" filter="url(#shadow)"/>
        <rect x="478" y="28" width="52" height="52" rx="16" fill="#EFF6FF"/>
        <text x="504" y="63" text-anchor="middle" font-size="24" fill="#2563EB">↯</text>
        <text x="478" y="112" class="h3">限流自动转移</text>
        <text x="478" y="150" class="body">429、5xx、超时和流式异常会进入保护事件，并自动切到备用渠道。</text>
        <rect x="900" width="420" height="220" rx="26" class="card" filter="url(#shadow)"/>
        <rect x="928" y="28" width="52" height="52" rx="16" fill="#F0FDFA"/>
        <text x="954" y="63" text-anchor="middle" font-size="24" fill="#0F766E">¥</text>
        <text x="928" y="112" class="h3">团队共享与成本控制</text>
        <text x="928" y="150" class="body">用令牌、配额、分组倍率和日志，把个人、团队、脚本流量拆清楚。</text>
      </g>
    </g>

    <!-- Bottom -->
    <g transform="translate(140 2220)">
      <rect width="1320" height="230" rx="34" fill="#0F172A" filter="url(#hardShadow)"/>
      <rect x="28" y="28" width="1264" height="174" rx="24" fill="rgba(255,255,255,.05)" stroke="rgba(255,255,255,.10)"/>
      <text x="68" y="86" font-size="18" font-weight="900" fill="#5EEAD4">开始使用</text>
      <text x="68" y="140" font-size="42" font-weight="950" fill="#FFFFFF">把 Codex 和 Claude Code 切到更稳的 API 入口</text>
      <text x="68" y="178" font-size="18" font-weight="600" fill="#9FB5C9">创建令牌后，将 Base URL 设置为本站地址，路由、价格、保护和日志交给网关处理。</text>
      <rect x="1036" y="78" width="150" height="58" rx="20" fill="#2563EB"/>
      <text x="1111" y="114" text-anchor="middle" font-size="17" font-weight="900" fill="#FFFFFF">进入控制台</text>
      <rect x="1202" y="78" width="128" height="58" rx="20" fill="#FFFFFF"/>
      <text x="1266" y="114" text-anchor="middle" font-size="17" font-weight="900" fill="#0F172A">接入文档</text>
