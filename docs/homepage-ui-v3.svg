    <rect x="1190" y="46" width="118" height="44" rx="22" fill="#FFFFFF" stroke="rgba(15,23,42,.08)"/>
    <text x="1249" y="74" text-anchor="middle" font-size="14" font-weight="850" fill="#0F172A">运行状态</text>
    <rect x="1320" y="46" width="118" height="44" rx="22" fill="#2563EB"/>
    <text x="1379" y="74" text-anchor="middle" font-size="14" font-weight="900" fill="white">进入控制台</text>

    <!-- Hero -->
    <rect x="140" y="144" width="1320" height="690" rx="34" fill="url(#hero)" stroke="rgba(15,23,42,.08)" filter="url(#shadow)"/>
    <path d="M1030 144H1426C1445 144 1460 159 1460 178V800C1460 819 1445 834 1426 834H890C1010 718 1048 522 1030 144Z" fill="#EAF7FF"/>
    <g transform="translate(202 208)">
