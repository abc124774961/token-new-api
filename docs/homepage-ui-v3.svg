<svg width="1600" height="2600" viewBox="0 0 1600 2600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="2600" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F2FFFC"/>
      <stop offset="0.34" stop-color="#F7FAFC"/>
      <stop offset="1" stop-color="#EEF4F8"/>
    </linearGradient>
    <linearGradient id="hero" x1="220" y1="120" x2="1360" y2="760" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.52" stop-color="#F5FFFC"/>
      <stop offset="1" stop-color="#E6F3FF"/>
    </linearGradient>
    <linearGradient id="ink" x1="960" y1="168" x2="1410" y2="650" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0D2230"/>
      <stop offset="1" stop-color="#101827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#14B8A6"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="24" stdDeviation="30" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
    <filter id="hardShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="34" stdDeviation="38" flood-color="#0F172A" flood-opacity="0.22"/>
    </filter>
    <style>
      .ui { font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans GB", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
      .mono { font-family: "SFMono-Regular", ui-monospace, Menlo, Consolas, monospace; }
      .h1 { font-size: 82px; font-weight: 900; letter-spacing: 0; fill: #0F172A; }
      .h2 { font-size: 44px; font-weight: 900; letter-spacing: 0; fill: #0F172A; }
      .h3 { font-size: 24px; font-weight: 850; fill: #0F172A; }
      .body { font-size: 19px; font-weight: 500; fill: #526174; }
      .small { font-size: 14px; font-weight: 750; fill: #64748B; }
      .tiny { font-size: 12px; font-weight: 750; fill: #8090A5; }
      .label { font-size: 13px; font-weight: 900; fill: #0F766E; }
      .card { fill: rgba(255,255,255,.92); stroke: rgba(15,23,42,.10); stroke-width: 1; }
      .darkLabel { font-size: 13px; font-weight: 850; fill: #9FB5C9; }
      .darkText { font-size: 16px; font-weight: 850; fill: #E5F3FF; }
      .darkTiny { font-size: 12px; font-weight: 750; fill: #8EA6BA; }
    </style>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" stroke="#0EA5E9" stroke-opacity="0.07"/>
    </pattern>
  </defs>

  <rect width="1600" height="2600" fill="url(#bg)"/>
  <rect width="1600" height="820" fill="url(#grid)" opacity="0.85"/>
  <path d="M0 650C220 720 380 720 620 650C860 580 1030 570 1255 640C1400 685 1500 694 1600 670V0H0V650Z" fill="#E6FFFA" opacity="0.55"/>

  <g class="ui">
    <!-- Header -->
    <rect x="140" y="32" width="1320" height="74" rx="22" fill="rgba(255,255,255,.78)" stroke="rgba(15,23,42,.08)" filter="url(#shadow)"/>
    <circle cx="184" cy="69" r="23" fill="#0F172A"/>
    <path d="M174 61h20l-5 6h10l-18 18 5-13h-12z" fill="#5EEAD4"/>
    <text x="220" y="64" font-size="20" font-weight="900" fill="#0F172A">CodeToken AI</text>
    <text x="220" y="84" font-size="12" font-weight="750" fill="#64748B">Codex / Claude Code API Gateway</text>
    <g transform="translate(610 46)">
      <rect width="380" height="44" rx="22" fill="#F8FAFC" stroke="rgba(15,23,42,.08)"/>
      <rect x="12" y="6" width="66" height="32" rx="16" fill="#DDFBF4" stroke="#7DD3C7"/>
      <text x="34" y="27" text-anchor="middle" font-size="14" font-weight="850" fill="#0F766E">首页</text>
      <text x="116" y="27" text-anchor="middle" font-size="14" font-weight="750" fill="#334155">控制台</text>
      <text x="194" y="27" text-anchor="middle" font-size="14" font-weight="750" fill="#334155">模型广场</text>
      <text x="272" y="27" text-anchor="middle" font-size="14" font-weight="750" fill="#334155">文档</text>
      <text x="338" y="27" text-anchor="middle" font-size="14" font-weight="750" fill="#334155">关于</text>
