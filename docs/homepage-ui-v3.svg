      <circle cx="22" cy="20" r="12" fill="#0F766E"/>
      <text x="44" y="25" font-size="14" font-weight="850" fill="#0F172A">为 AI 编程场景打造的稳定入口</text>
      <text x="0" y="118" class="h1">Codex / Claude Code</text>
      <text x="0" y="208" class="h1">企业级中转站</text>
      <text x="0" y="274" font-size="44" font-weight="900" fill="#0F766E">多渠道无感切换，低价高速接入主流模型</text>
      <text x="0" y="334" class="body">把上游限流、断流、慢响应和成本波动挡在开发工具之外。</text>
      <text x="0" y="366" class="body">一个 Base URL，一把 Key，稳定服务 Codex、Claude Code、OpenAI SDK 与团队脚本。</text>
      <g transform="translate(0 420)">
        <rect width="146" height="52" rx="18" fill="#2563EB"/>
        <text x="73" y="33" text-anchor="middle" font-size="16" font-weight="900" fill="#FFFFFF">获取密钥</text>
        <rect x="160" width="146" height="52" rx="18" fill="#FFFFFF" stroke="rgba(15,23,42,.12)"/>
        <text x="233" y="33" text-anchor="middle" font-size="16" font-weight="900" fill="#0F172A">查看文档</text>
      </g>
      <g transform="translate(0 514)">
        <rect width="650" height="106" rx="20" fill="rgba(255,255,255,.84)" stroke="rgba(15,23,42,.08)"/>
        <g transform="translate(28 24)">
          <text class="mono" font-size="30" font-weight="950" fill="#0F172A">99.98%</text>
          <text y="42" class="small">近 30 天成功率</text>
        </g>
        <g transform="translate(236 24)">
          <text class="mono" font-size="30" font-weight="950" fill="#0F172A">184ms</text>
          <text y="42" class="small">平均响应延迟</text>
        </g>
        <g transform="translate(444 24)">
          <text class="mono" font-size="30" font-weight="950" fill="#0F172A">40+</text>
          <text y="42" class="small">多模型渠道池</text>
        </g>
      </g>
    </g>

    <!-- Hero Cockpit -->
    <g transform="translate(940 190)" filter="url(#hardShadow)">
      <rect width="430" height="560" rx="28" fill="url(#ink)"/>
      <rect x="18" y="18" width="394" height="524" rx="20" fill="rgba(255,255,255,.05)" stroke="rgba(255,255,255,.12)"/>
      <text x="42" y="60" class="darkText">实时调度中控</text>
      <rect x="316" y="38" width="70" height="28" rx="14" fill="rgba(20,184,166,.18)"/>
      <text x="351" y="56" text-anchor="middle" font-size="12" font-weight="900" fill="#99F6E4">健康</text>
      <rect x="42" y="88" width="344" height="46" rx="12" fill="#0B1624"/>
      <text x="58" y="116" class="mono" font-size="13" fill="#D1FAE5">codex --base-url https://api.codetoken.top/v1</text>
      <g transform="translate(42 158)">
        <rect width="92" height="76" rx="14" fill="#172536" stroke="rgba(94,234,212,.25)"/>
        <text x="46" y="32" text-anchor="middle" font-size="18" fill="#5EEAD4">⌘</text>
        <text x="46" y="56" text-anchor="middle" class="darkText" font-size="13">Codex</text>
        <rect x="126" width="92" height="76" rx="14" fill="#172536" stroke="rgba(94,234,212,.25)"/>
        <text x="172" y="32" text-anchor="middle" font-size="18" fill="#5EEAD4">◆</text>
        <text x="172" y="56" text-anchor="middle" class="darkText" font-size="13">智能路由</text>
        <rect x="252" width="92" height="76" rx="14" fill="#172536" stroke="rgba(94,234,212,.25)"/>
        <text x="298" y="32" text-anchor="middle" font-size="18" fill="#5EEAD4">↯</text>
        <text x="298" y="56" text-anchor="middle" class="darkText" font-size="13">健康渠道</text>
        <path d="M94 38H126" stroke="#5EEAD4" stroke-width="2" stroke-dasharray="5 5"/>
        <path d="M220 38H252" stroke="#5EEAD4" stroke-width="2" stroke-dasharray="5 5"/>
      </g>
      <g transform="translate(42 258)">
        <rect width="106" height="78" rx="14" fill="#172536"/>
        <text x="16" y="28" class="darkLabel">成功率</text>
        <text x="16" y="56" class="mono" font-size="24" font-weight="950" fill="#E5F3FF">99.98%</text>
        <rect x="119" width="106" height="78" rx="14" fill="#172536"/>
        <text x="135" y="28" class="darkLabel">保护事件</text>
