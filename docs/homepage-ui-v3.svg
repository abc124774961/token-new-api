          <rect x="240" width="10" height="40" rx="3" fill="#2563EB" opacity=".70"/>
          <rect x="260" width="10" height="50" rx="3" fill="#2563EB" opacity=".82"/>
          <rect x="280" width="10" height="46" rx="3" fill="#2563EB" opacity=".76"/>
          <rect x="300" width="10" height="56" rx="3" fill="#2563EB" opacity=".90"/>
