services:
  new-api:
    build:
      context: .
      dockerfile: Dockerfile.local
    image: token-new-api-local:latest
    container_name: token-new-api-local
    restart: unless-stopped
    command: --log-dir /app/logs
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
